<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Liid · Design Lab — Sending Funnel (round 2)</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    background: #141414;
    color: #eee;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    background: #0c0c0c;
    border-bottom: 1px solid #2a2a2a;
    flex-wrap: wrap;
  }
  .brand {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.01em;
    margin-right: 4px;
    white-space: nowrap;
  }
  .brand small { font-weight: 400; color: #888; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  button.tab {
    appearance: none;
    border: 1px solid #333;
    background: #1c1c1c;
    color: #bbb;
    font: inherit;
    font-size: 12px;
    padding: 6px 11px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .12s ease;
    white-space: nowrap;
  }
  button.tab:hover { border-color: #555; color: #fff; }
  button.tab .num { color: #666; margin-right: 6px; font-variant-numeric: tabular-nums; }
  button.tab[aria-selected="true"] {
    background: #fff; color: #000; border-color: #fff;
  }
  button.tab[aria-selected="true"] .num { color: #888; }
  .hint { margin-left: auto; font-size: 11px; color: #666; white-space: nowrap; }
  .frame-wrap { flex: 1; min-height: 0; background: #000; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
</style>
</head>
<body>
  <header>
    <div class="brand">Liid <small>· design lab — sending funnel · round 2</small></div>
    <div class="tabs" id="tabs">
      <button class="tab" data-src="d1-calm.html"><span class="num">1</span>Calm Pro</button>
      <button class="tab" data-src="d2-cards.html"><span class="num">2</span>Elevated Cards</button>
      <button class="tab" data-src="d3-outline.html"><span class="num">3</span>Crisp Outline</button>
      <button class="tab" data-src="d4-canvas.html"><span class="num">4</span>Color Spine</button>
      <button class="tab" data-src="d5-headers.html"><span class="num">5</span>Tinted Headers</button>
      <button class="tab" data-src="d6-soft-brutalist.html"><span class="num">6</span>Soft Brutalist</button>
    </div>
    <div class="hint">press 1–6 to switch</div>
  </header>
  <div class="frame-wrap">
    <iframe id="frame" src="d1-calm.html" title="design preview"></iframe>
  </div>
<script>
  const tabs = [...document.querySelectorAll('.tab')];
  const frame = document.getElementById('frame');
  function select(i) {
    i = Math.max(0, Math.min(tabs.length - 1, i));
    tabs.forEach((t, j) => t.setAttribute('aria-selected', j === i ? 'true' : 'false'));
    frame.src = tabs[i].dataset.src;
  }
  tabs.forEach((t, i) => t.addEventListener('click', () => select(i)));
  window.addEventListener('keydown', (e) => {
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= tabs.length) select(n - 1);
  });
  select(0);
</script>
</body>
</html>
