<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Liid · Landing Lab (Calm Pro)</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    background: #141414; color: #eee;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 16px; background: #0c0c0c; border-bottom: 1px solid #2a2a2a; flex-wrap: wrap;
  }
  .brand { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; margin-right: 4px; white-space: nowrap; }
  .brand small { font-weight: 400; color: #888; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  button.tab {
    appearance: none; border: 1px solid #333; background: #1c1c1c; color: #bbb;
    font: inherit; font-size: 12px; padding: 6px 11px; border-radius: 999px; cursor: pointer;
    transition: all .12s ease; white-space: nowrap;
  }
  button.tab:hover { border-color: #555; color: #fff; }
  button.tab .num { color: #666; margin-right: 6px; font-variant-numeric: tabular-nums; }
  button.tab[aria-selected="true"] { background: #fff; color: #000; border-color: #fff; }
  button.tab[aria-selected="true"] .num { color: #888; }
  button.tab.star { border-color:#caa44a; color:#e7c46b; }
  button.tab.star[aria-selected="true"] { background:#e7c46b; color:#000; border-color:#e7c46b; }
  .hint { margin-left: auto; font-size: 11px; color: #666; white-space: nowrap; }
  .frame-wrap { flex: 1; min-height: 0; background: #000; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
</style>
</head>
<body>
  <header>
    <div class="brand">Liid <small>· landing lab — Calm Pro language</small></div>
    <div class="tabs" id="tabs">
      <button class="tab star" data-src="l0-combined.html"><span class="num">0</span>★ Combined</button>
      <button class="tab" data-src="l1-classic.html"><span class="num">1</span>Classic SaaS</button>
      <button class="tab" data-src="l2-product-led.html"><span class="num">2</span>Product-led</button>
      <button class="tab" data-src="l3-walkthrough.html"><span class="num">3</span>Walkthrough</button>
      <button class="tab" data-src="l4-problem-outcome.html"><span class="num">4</span>Problem→Outcome</button>
      <button class="tab" data-src="l5-minimal.html"><span class="num">5</span>Minimal</button>
      <button class="tab" data-src="l6-comparison.html"><span class="num">6</span>Comparison</button>
    </div>
    <div class="hint">press 0–6 to switch</div>
  </header>
  <div class="frame-wrap">
    <iframe id="frame" src="l0-combined.html" title="landing preview"></iframe>
  </div>
<script>
  const tabs = [...document.querySelectorAll('.tab')];
  const frame = document.getElementById('frame');
  function select(i) {
    i = Math.max(0, Math.min(tabs.length - 1, i));
    tabs.forEach((t, j) => t.setAttribute('aria-selected', j === i ? 'true' : 'false'));
    frame.src = tabs[i].dataset.src;
  }
  tabs.forEach((t, i) => t.addEventListener('click', () => select(i)));
  window.addEventListener('keydown', (e) => {
    const n = parseInt(e.key, 10);
    if (!Number.isNaN(n) && n >= 0 && n < tabs.length) select(n); // 0 = Combined, 1–6 = the rest
  });
  select(0);
</script>
</body>
</html>
